# Builds flutter/ and publishes to GitHub Pages.
# After first run: Repo → Settings → Pages → Build & deployment → Source: GitHub Actions.

name: Deploy Flutter Web to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

# Prefer Node 24 for JS-based actions (GitHub is deprecating Node 20 on runners).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Build web
        working-directory: flutter
        run: |
          flutter pub get
          flutter build web --release --base-href "/${{ github.event.repository.name }}/" --dart-define=MAPBOX_ACCESS_TOKEN=${{ secrets.MAPBOX_ACCESS_TOKEN }} --dart-define=OPENWEATHER_API_KEY=${{ secrets.OPENWEATHER_API_KEY }}

      - uses: actions/upload-pages-artifact@v4
        with:
          path: flutter/build/web

      - id: deployment
        uses: actions/deploy-pages@v4
