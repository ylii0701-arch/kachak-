# Safer defaults: very large heaps can prevent the daemon from starting on some machines
# ("Could not connect to the Gradle daemon"). Raise if you have plenty of RAM and large builds.
org.gradle.jvmargs=-Xmx4G -XX:MaxMetaspaceSize=768m -XX:ReservedCodeCacheSize=256m -XX:+HeapDumpOnOutOfMemoryError
android.useAndroidX=true
# If daemon issues persist after `./gradlew --stop`, try uncommenting (builds will be slower):
# org.gradle.daemon=false
